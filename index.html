<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المارد (201-450) - سيرفر 92</title>
    <style>
        :root { --gold: #ffd700; --accent: #2ebcbe; --bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #e0e0e0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; position: relative; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .header-section { margin-bottom: 20px; }
        h1 { color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 8px; font-size: 1.6rem; }
        .credit { font-size: 0.8rem; color: #bbb; font-style: italic; }
        .input-card { background: #252525; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--gold); font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; background: #333; color: white; border: 1px solid #555; text-align: center; font-size: 1rem; box-sizing: border-box; cursor: pointer; }
        input:focus, select:focus { outline: none; border-color: var(--gold); }
        .btn { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); background: #ffcc00; }
        .results { margin-top: 15px; padding: 20px; background: #000; border-radius: 15px; display: none; border-right: 6px solid var(--gold); text-align: right; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; border-bottom: 1px solid #222; padding-bottom: 5px; align-items: center; }
        .res-line span:last-child { color: #fff; font-weight: bold; text-align: left; }
        .hufra-list { font-size: 0.75rem; color: #ffa500; background: #1a1500; padding: 8px; border-radius: 5px; margin-top: 5px; display: block; line-height: 1.4; border: 1px solid #443300; }
        .final-line { margin-top: 15px; text-align: center; background: #1a1a1a; padding: 10px; border-radius: 8px; }
        .success-text { color: #32cd32; font-weight: bold; display: block; margin-bottom: 10px; text-align: center; font-size: 1.1rem; }
        .total-val { color: var(--gold); font-size: 1.8rem; font-weight: bold; }
        .footer-signature { position: fixed; bottom: 10px; left: 15px; font-size: 0.65rem; color: #444; direction: ltr; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>🔥 حاسبة المارد (201 - 450)</h1>
        <div class="credit">تم البرمجه خاص لسيرفر 92 مع الحب ❤️</div>
    </div>

    <div class="input-card">
        <div class="input-group">
            <label>المستوى الحالي:</label>
            <input type="number" id="currentLvl" placeholder="مثلاً: 201" min="201" max="449">
        </div>
        <div class="input-group">
            <label>المستوى المطلوب:</label>
            <input type="number" id="targetLvl" placeholder="مثلاً: 450" min="202" max="450">
        </div>
        <div class="input-group">
            <label>اختر نسبة الخصم:</label>
            <select id="discount">
                <option value="0">بدون خصم (0%)</option>
                <option value="10">خصم 10%</option>
                <option value="15">خصم 15%</option>
                <option value="30">خصم 30%</option>
            </select>
        </div>
    </div>

    <button class="btn" onclick="calculate()">تحليل التكاليف 💰</button>

    <div id="result-box" class="results">
        <span class="success-text">تم الحساب بنجاح ✅</span>
        
        <div class="res-line">
            <span>تكلفة اللفلات <br><small id="rangeText" style="color:#888; font-size:0.7rem;"></small>:</span>
            <span id="lvlOnly">0</span>
        </div>

        <div class="res-line" style="flex-direction: column; align-items: flex-start;">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <span>تكلفة الحفر (الترقية):</span>
                <span id="orangeOnly" style="color: #ff8c00 !important;">0</span>
            </div>
            <div id="hufraLog" class="hufra-list" style="display:none;"></div>
        </div>

        <div class="res-line" id="discLine" style="display:none;">
            <span>قيمة الخصم المستقطع:</span>
            <span id="discAmount" style="color: #ff4500 !important;">0</span>
        </div>

        <div class="final-line">
            <div style="color: #aaa; font-size: 0.8rem; margin-bottom: 5px;">المجموع النهائي المطلوب:</div>
            <div class="total-val" id="totalRes">0</div>
            <div style="color: var(--gold); font-size: 0.7rem;">لهب جمرة المارد</div>
        </div>
    </div>
</div>

<div class="footer-signature">برمجه وتنفيذ الشيخ اعدام 92</div>

<script>
    function calculate() {
        let current = parseInt(document.getElementById('currentLvl').value);
        let target = parseInt(document.getElementById('targetLvl').value);
        let disc = parseFloat(document.getElementById('discount').value) || 0;

        // التحقق من النطاق المطلوب
        if (isNaN(current) || isNaN(target) || current < 201 || target > 450 || current >= target) {
            alert("يرجى إدخال مستويات صحيحة ضمن النطاق (201 - 450)");
            return;
        }

        let totalLvlCost = 0;
        let totalOrangeCost = 0;
        let hufraFound = [];
        
        const orangeData = {
            210: 7000, 220: 7000, 230: 7400, 240: 7700, 250: 12000,
            260: 8000, 270: 8000, 280: 8000, 290: 9300, 300: 14400,
            310: 10000, 320: 8000, 330: 8000, 340: 9300, 350: 13400,
            360: 10000, 370: 9000, 380: 9300, 390: 9700, 400: 16000,
            410: 14000, 420: 16000, 430: 19000, 440: 22000, 450: 20000
        };

        function getBlackCost(lvl) {
            if (lvl >= 201 && lvl <= 210) return 480 + (lvl-201)*50;
            if (lvl >= 211 && lvl <= 220) return 560 + (lvl-211)*50;
            if (lvl >= 221 && lvl <= 230) return 640 + (lvl-221)*50;
            if (lvl >= 231 && lvl <= 240) return 720 + (lvl-231)*50;
            if (lvl >= 241 && lvl <= 250) return 800 + (lvl-241)*50;
            return 800 + (Math.floor(lvl/10)*20); 
        }

        for (let i = current + 1; i <= target; i++) {
            totalLvlCost += getBlackCost(i);
            if (orangeData[i]) {
                totalOrangeCost += orangeData[i];
                hufraFound.push("حفرة لفل " + i + " (" + orangeData[i].toLocaleString() + ")");
            }
        }

        let combined = totalLvlCost + totalOrangeCost;
        let discVal = combined * (disc/100);
        let final = combined - discVal;

        document.getElementById('result-box').style.display = "block";
        document.getElementById('rangeText').innerText = "(من لفل " + (current + 1) + " إلى لفل " + target + ")";
        document.getElementById('lvlOnly').innerText = totalLvlCost.toLocaleString();
        document.getElementById('orangeOnly').innerText = totalOrangeCost.toLocaleString();
        
        const hufraDiv = document.getElementById('hufraLog');
        if (hufraFound.length > 0) {
            hufraDiv.style.display = "block";
            hufraDiv.innerHTML = "<strong>تفاصيل الحفر المشمولة:</strong><br>" + hufraFound.join("<br>");
        } else {
            hufraDiv.style.display = "none";
        }

        if(disc > 0) {
            document.getElementById('discLine').style.display = "flex";
            document.getElementById('discAmount').innerText = "-" + Math.floor(discVal).toLocaleString();
        } else {
            document.getElementById('discLine').style.display = "none";
        }

        document.getElementById('totalRes').innerText = Math.floor(final).toLocaleString();
    }
</script>

</body>
</html>
